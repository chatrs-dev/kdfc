<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Add Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; padding: 50px; }
        .form-container { background: #1e293b; padding: 30px; border-radius: 15px; width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        button { width: 100%; padding: 12px; background: #38bdf8; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        h2 { text-align: center; }
        .back { display: block; text-align: center; color: #94a3b8; margin-top: 20px; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Add Player Card</h2>
        <input type="text" id="name" placeholder="Player Full Name">
        <input type="text" id="idName" placeholder="Badge ID (e.g. PESBD-000)">
        <input type="text" id="uniqueID" placeholder="Unique Game ID">
        <input type="text" id="device" placeholder="Device Name">
        <input type="text" id="photoURL" placeholder="Photo URL (Image link)">
        <button onclick="savePlayer()">Save to Database</button>
        <a href="index.html" class="back">← Back to Cards</a>
    </div>

    <script>
        // USE THE SAME FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyDc0l9Fr-i1RJchaaeRMlUUzwzT2v5zuTY",
  authDomain: "card-beaa8.firebaseapp.com",
  databaseURL: "https://card-beaa8-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "card-beaa8",
  storageBucket: "card-beaa8.firebasestorage.app",
  messagingSenderId: "973719246951",
  appId: "1:973719246951:web:fac8c8beae6aba55329cc2",
  measurementId: "G-BEFJY7RCDW"
};

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function savePlayer() {
            const name = document.getElementById('name').value;
            const idName = document.getElementById('idName').value;
            const uniqueID = document.getElementById('uniqueID').value;
            const device = document.getElementById('device').value;
            const photoURL = document.getElementById('photoURL').value;

            if(name && photoURL) {
                db.ref('players').push({
                    name, idName, uniqueID, device, photoURL
                }).then(() => {
                    alert("Player Added Successfully!");
                    document.querySelectorAll('input').forEach(i => i.value = '');
                });
            } else {
                alert("Please fill name and photo URL");
            }
        }
    </script>
</body>
</html>
